name: Stability Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      case_filter:
        description: "Optional case filter substring"
        required: false
        default: "playwright_e2e_demo"
      stability_runs:
        description: "Total stability runs"
        required: false
        default: "10"
      min_consecutive_pass:
        description: "Gate threshold for min consecutive pass"
        required: false
        default: "10"
      case_fluctuation_topn:
        description: "TopN size for case fluctuation views"
        required: false
        default: "5"
      min_pass_rate:
        description: "Alert threshold for summary.passRate"
        required: false
        default: "0.95"
      max_planner_failures:
        description: "Alert threshold for summary.plannerFailureStats.total"
        required: false
        default: "0"

jobs:
  run-stability:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CASE_FILTER: ${{ inputs.case_filter || 'playwright_e2e_demo' }}
      STABILITY_RUNS: ${{ inputs.stability_runs || '10' }}
      STABILITY_MIN_CONSECUTIVE_PASS: ${{ inputs.min_consecutive_pass || '10' }}
      STABILITY_CASE_FLUCTUATION_TOPN: ${{ inputs.case_fluctuation_topn || '5' }}
      STABILITY_MIN_PASS_RATE: ${{ inputs.min_pass_rate || '0.95' }}
      STABILITY_MAX_PLANNER_FAILURES: ${{ inputs.max_planner_failures || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run stability regression
        id: stability
        shell: bash
        run: |
          set +e
          python -m aut.runner.cli \
            --run-stability \
            --case-root cases \
            --case-filter "${CASE_FILTER}" \
            --replay-dir .aut/replays \
            --stability-runs "${STABILITY_RUNS}" \
            --stability-min-consecutive-pass "${STABILITY_MIN_CONSECUTIVE_PASS}" \
            --stability-case-topn "${STABILITY_CASE_FLUCTUATION_TOPN}" \
            > stability-report.json
          cli_exit_code=$?
          set -e
          echo "cli_exit_code=${cli_exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Evaluate alert thresholds
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("stability-report.json")
          if not report_path.exists():
              print("::error::stability-report.json was not generated")
              raise SystemExit(1)

          payload = json.loads(report_path.read_text(encoding="utf-8"))
          summary = payload.get("summary", {})
          gate = payload.get("gate", {})
          planner_stats = summary.get("plannerFailureStats", {})
          fluctuation_topn = summary.get("caseFluctuationTopN", {})
          top_by_failure_rate = fluctuation_topn.get("byFailureRate", [])
          top_by_category = fluctuation_topn.get("byCategoryDistribution", [])

          cli_exit_code = int(os.environ.get("CLI_EXIT_CODE", "1"))
          min_pass_rate = float(os.environ.get("STABILITY_MIN_PASS_RATE", "0.95"))
          max_planner_failures = int(os.environ.get("STABILITY_MAX_PLANNER_FAILURES", "0"))
          expected_min_consecutive = int(os.environ.get("STABILITY_MIN_CONSECUTIVE_PASS", "10"))

          pass_rate = float(summary.get("passRate", 0.0))
          max_consecutive = int(summary.get("maxConsecutivePass", 0))
          planner_failure_total = int(planner_stats.get("total", 0))
          gate_passed = bool(gate.get("passed", False))

          failures = []
          if cli_exit_code != 0:
              failures.append(f"cli gate failed (exit code={cli_exit_code})")
          if not gate_passed:
              failures.append("payload gate.passed is false")
          if max_consecutive < expected_min_consecutive:
              failures.append(
                  f"maxConsecutivePass {max_consecutive} < required {expected_min_consecutive}"
              )
          if pass_rate < min_pass_rate:
              failures.append(f"passRate {pass_rate:.2%} < threshold {min_pass_rate:.2%}")
          if planner_failure_total > max_planner_failures:
              failures.append(
                  "plannerFailureStats.total "
                  f"{planner_failure_total} > threshold {max_planner_failures}"
              )

          print(
              "Stability summary:",
              json.dumps(
                  {
                      "passRate": pass_rate,
                      "maxConsecutivePass": max_consecutive,
                      "plannerFailureTotal": planner_failure_total,
                        "caseFluctuationTopNSize": int(fluctuation_topn.get("size", 0)),
                      "gatePassed": gate_passed,
                      "cliExitCode": cli_exit_code,
                  },
                  ensure_ascii=False,
              ),
          )

                  alert_context = {
                    "summary": {
                      "passRate": pass_rate,
                      "maxConsecutivePass": max_consecutive,
                      "plannerFailureTotal": planner_failure_total,
                      "gatePassed": gate_passed,
                      "cliExitCode": cli_exit_code,
                    },
                    "thresholds": {
                      "minPassRate": min_pass_rate,
                      "minConsecutivePass": expected_min_consecutive,
                      "maxPlannerFailures": max_planner_failures,
                    },
                    "caseFluctuationTopN": {
                      "size": int(fluctuation_topn.get("size", 0)),
                      "byFailureRate": top_by_failure_rate,
                      "byCategoryDistribution": top_by_category,
                    },
                    "failures": failures,
                  }
                  Path("stability-alert-context.json").write_text(
                    json.dumps(alert_context, ensure_ascii=False, indent=2),
                    encoding="utf-8",
                  )

                  step_summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
                  if step_summary_path:
                    def _fmt_percent(value: float) -> str:
                      return f"{value * 100:.2f}%"

                    summary_lines = [
                      "## Stability Nightly Summary",
                      "",
                      f"- Gate Passed: `{gate_passed}`",
                      f"- CLI Exit Code: `{cli_exit_code}`",
                      f"- Pass Rate: `{_fmt_percent(pass_rate)}` (threshold `{_fmt_percent(min_pass_rate)}`)",
                      f"- Max Consecutive Pass: `{max_consecutive}` (threshold `{expected_min_consecutive}`)",
                      f"- Planner Failure Total: `{planner_failure_total}` (threshold `{max_planner_failures}`)",
                      "",
                      "### Case Fluctuation TopN by Failure Rate",
                      "| Case | Failure Rate | Failed Runs | Total Runs | Planner Failure Total |",
                      "| --- | ---: | ---: | ---: | ---: |",
                    ]
                    if top_by_failure_rate:
                      for item in top_by_failure_rate:
                        summary_lines.append(
                          "| {case} | {failure_rate} | {failed_runs} | {total_runs} | {planner_total} |".format(
                            case=item.get("case", ""),
                            failure_rate=_fmt_percent(float(item.get("failureRate", 0.0))),
                            failed_runs=int(item.get("failedRuns", 0)),
                            total_runs=int(item.get("totalRuns", 0)),
                            planner_total=int(item.get("plannerFailureTotal", 0)),
                          )
                        )
                    else:
                      summary_lines.append("| - | - | - | - | - |")

                    summary_lines.extend(
                      [
                        "",
                        "### Case Fluctuation TopN by Category Distribution",
                        "| Case | Category Count | Planner Failure Total | Top Categories |",
                        "| --- | ---: | ---: | --- |",
                      ]
                    )
                    if top_by_category:
                      for item in top_by_category:
                        distribution = item.get("categoryDistribution", [])
                        category_preview = []
                        if isinstance(distribution, list):
                          for category_item in distribution[:3]:
                            if isinstance(category_item, dict):
                              category_preview.append(
                                f"{category_item.get('category', '')}:{int(category_item.get('count', 0))}"
                              )
                        summary_lines.append(
                          "| {case} | {category_count} | {planner_total} | {preview} |".format(
                            case=item.get("case", ""),
                            category_count=int(item.get("plannerFailureCategoryCount", 0)),
                            planner_total=int(item.get("plannerFailureTotal", 0)),
                            preview=", ".join(category_preview) if category_preview else "-",
                          )
                        )
                    else:
                      summary_lines.append("| - | - | - | - |")

                    if failures:
                      summary_lines.extend(["", "### Alert Failures"])
                      for item in failures:
                        summary_lines.append(f"- {item}")

                    with open(step_summary_path, "a", encoding="utf-8") as handle:
                      handle.write("\n".join(summary_lines) + "\n")

          if failures:
              for item in failures:
                  print(f"::error::{item}")
              raise SystemExit(1)

          print("Alert thresholds satisfied.")
          PY
        env:
          CLI_EXIT_CODE: ${{ steps.stability.outputs.cli_exit_code }}

      - name: Upload stability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-report
          path: |
            stability-report.json
            stability-alert-context.json
          if-no-files-found: error
